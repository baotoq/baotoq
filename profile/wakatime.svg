    </g>
  
    <g transform="translate(25, 75)">
      <circle cx="5" cy="6" r="5" fill="#858585" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        Other - 92 hrs 49 mins
      </text>
