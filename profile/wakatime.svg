
      <svg
        width="495"
        height="165"
        viewBox="0 0 495 165"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        role="img"
        aria-labelledby="descId"
      >
        <title id="titleId"></title>
        <desc id="descId"></desc>
        <style>
          .header {
            font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
            fill: #539bf5;
            animation: fadeInAnimation 0.8s ease-in-out forwards;
          }
          @supports(-moz-appearance: auto) {
            /* Selector detects Firefox */
            .header { font-size: 15.5px; }
          }
          
    
    .stat {
      font: 600 14px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #ADBAC7;
    }
    @supports(-moz-appearance: auto) {
      /* Selector detects Firefox */
      .stat { font-size:12px; }
    }
    .stagger {
      opacity: 0;
      animation: fadeInAnimation 0.3s ease-in-out forwards;
    }
    .not_bold { font-weight: 400 }
    .bold { font-weight: 700 }
  
    @keyframes slideInAnimation {
      from {
        width: 0;
      }
      to {
        width: calc(100%-100px);
      }
    }
    @keyframes growWidthAnimation {
      from {
        width: 0;
      }
      to {
        width: 100%;
      }
    }
    .lang-name { font: 400 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #ADBAC7 }
    #rect-mask rect{
      animation: slideInAnimation 1s ease-in-out forwards;
    }
    .lang-progress{
      animation: growWidthAnimation 0.6s ease-in-out forwards;
    }
    

          
      /* Animations */
      @keyframes scaleInAnimation {
        from {
          transform: translate(-5px, 5px) scale(0);
        }
        to {
          transform: translate(-5px, 5px) scale(1);
        }
      }
      @keyframes fadeInAnimation {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    
          
        </style>

        

        <rect
          data-testid="card-bg"
          x="0.5"
          y="0.5"
          rx="4.5"
          height="99%"
          stroke="#373E47"
          width="494"
          fill="#24292F"
          stroke-opacity="1"
        />

        
      <g
        data-testid="card-title"
        transform="translate(25, 35)"
      >
        <g transform="translate(0, 0)">
      <text
        x="0"
        y="0"
        class="header"
        data-testid="header"
      >Time Spend since 2024</text>
    </g>
      </g>
    

        <g
          data-testid="main-card-body"
          transform="translate(0, 55)"
        >
          
    <svg x="0" y="0" width="100%">
      
      <mask id="rect-mask">
      <rect x="25" y="0" width="440" height="8" fill="white" rx="5" />
      </mask>
      
          <rect
            mask="url(#rect-mask)"
            data-testid="lang-progress"
            x="0"
            y="0"
            width="302.6685"
            height="8"
            fill="#178600"
          />
        
          <rect
            mask="url(#rect-mask)"
            data-testid="lang-progress"
            x="302.6685"
            y="0"
            width="72.40050000000001"
            height="8"
            fill="#858585"
          />
        
          <rect
            mask="url(#rect-mask)"
            data-testid="lang-progress"
            x="375.069"
            y="0"
            width="48.220499999999994"
            height="8"
            fill="#3178c6"
          />
        
          <rect
            mask="url(#rect-mask)"
            data-testid="lang-progress"
            x="423.28950000000003"
            y="0"
            width="16.554000000000002"
            height="8"
            fill="#292929"
          />
        
          <rect
            mask="url(#rect-mask)"
            data-testid="lang-progress"
            x="439.84350000000006"
            y="0"
            width="15.5775"
            height="8"
            fill="#cb171e"
          />
        
          <rect
            mask="url(#rect-mask)"
            data-testid="lang-progress"
            x="455.42100000000005"
            y="0"
            width="11.439"
            height="8"
            fill="#858585"
          />
        
      
    <g transform="translate(25, 25)">
      <circle cx="5" cy="6" r="5" fill="#178600" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        C# - 785 hrs 6 mins
      </text>
    </g>
  
    <g transform="translate(230, 25)">
      <circle cx="5" cy="6" r="5" fill="#858585" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        Vue.js - 187 hrs 49 mins
      </text>
    </g>
  
    <g transform="translate(25, 50)">
      <circle cx="5" cy="6" r="5" fill="#3178c6" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        TypeScript - 125 hrs 2 mins
      </text>
    </g>
  
    <g transform="translate(230, 50)">
      <circle cx="5" cy="6" r="5" fill="#292929" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        JSON - 43 hrs 1 min
      </text>
    </g>
  
    <g transform="translate(25, 75)">
      <circle cx="5" cy="6" r="5" fill="#cb171e" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        YAML - 40 hrs 29 mins
      </text>
    </g>
  
    <g transform="translate(230, 75)">
      <circle cx="5" cy="6" r="5" fill="#858585" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        Other - 29 hrs 39 mins
      </text>
    </g>
  
    
    </svg>
  
